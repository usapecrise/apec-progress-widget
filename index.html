<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Progress Widget</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="widget">

    <!-- Header -->
    <div class="top">

        <div class="title">
            Progress
        </div>

        <div
            id="percent"
            class="percent">

            0%

        </div>

    </div>

    <!-- Progress Bar -->
    <div class="progress-wrapper">

        <div class="track">

            <div
                id="fill"
                class="fill">
            </div>

        </div>

        <div
            id="dots"
            class="dots">
        </div>

    </div>

</div>

    <!-- Progress Circles -->
    <div
        id="progressLine"
        class="progress-line">
    </div>


</div>

<!-- Jotform Widget API -->
<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>

<!-- Widget Logic -->
<script src="script.js"></script>

<!-- Jotform Integration -->
<script src="jotform.js"></script>

</body>

</html>
